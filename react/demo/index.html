<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thumbrella React Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 16px; color: #e94560; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

    .tbr-wrap { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #0d1225; overflow: hidden; border-radius: 6px; }
    .tbr-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
    .tbr-final { opacity: 0; transition: opacity 0.3s ease; }
    .tbr-loaded .tbr-final { opacity: 1; }

    .tbr-spinner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; }
    .tbr-spinner::after { content: ""; width: 22px; height: 22px; border: 3px solid #1e2d50; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tbr-requested .tbr-spinner, .tbr-intermediate .tbr-spinner { opacity: 1; }
  </style>
</head>
<body>
  <h1>Thumbrella React Demo</h1>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
